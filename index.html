<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Chat</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 1200px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.total {
  font-size: 40px;
  font-weight: bold;
}

.filter {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.filter input {
  padding: 8px 10px;
  border-radius: 6px;
  border: none;
  background: #0f172a;
  color: white;
}

.filter button {
  padding: 8px 16px;
  background: #38bdf8;
  border: none;
  border-radius: 6px;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.filter button:hover {
  background: #0ea5e9;
}

canvas {
  height: 300px !important;
}

.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #334155;
  border-top: 5px solid #38bdf8;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div class="container">

  <div class="card filter">
    <label>Tanggal:</label>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="loadData()">Filter</button>
  </div>

  <div class="card">
    <div>Total Chat</div>
    <div class="total" id="totalChat">0</div>
  </div>

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Memuat data...</p>
</div>

<script>
let chart;

const API_URL = "https://script.google.com/macros/s/AKfycby2ehtY358ZM9kkRF9tpyU9HInuevVZyKXnPltrbXY4PuigxVKmcyYTl3fwGzC-oN_Yrw/exec";

function formatDateLocal(dateStr) {
  const d = new Date(dateStr);
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${year}-${month}-${day}`;
}

async function loadData() {
  document.getElementById("loading").style.display = "flex";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    let grouped = {};
    let total = 0;

    const isSingleDay = start && end && start === end;

    data.forEach(item => {
      let date = item.date;
      let time = item.time;

      if (!date) return;

      date = formatDateLocal(date);

      if (start && date < start) return;
      if (end && date > end) return;

      let label;

      if (isSingleDay) {
        if (!time) return;

        // 🔥 parsing jam FIX 100%
        let rawTime = String(time).trim();
        rawTime = rawTime.replace(".", ":");

        let parts = rawTime.split(":");
        let hour = parts[0].padStart(2, "0");

        label = hour + ".00";

      } else {
        label = date;
      }

      if (!grouped[label]) grouped[label] = 0;
      grouped[label]++;
      total++;
    });

    document.getElementById("totalChat").innerText = total;

    let labels;

    if (isSingleDay) {
      labels = [];

      for (let i = 0; i < 24; i++) {
        let h = String(i).padStart(2, "0") + ".00";
        labels.push(h);

        if (!grouped[h]) grouped[h] = 0;
      }
    } else {
      labels = Object.keys(grouped).sort();
    }

    const values = labels.map(l => grouped[l]);

    renderChart(labels, values);

  } catch (err) {
    console.error(err);
    alert("Gagal ambil data");
  }

  document.getElementById("loading").style.display = "none";
}

function renderChart(labels, data) {
  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Jumlah Chat",
        data: data,
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          ticks: {
            autoSkip: false,
            maxRotation: 0
          }
        }
      }
    }
  });
}

loadData();
</script>

</body>
</html>
