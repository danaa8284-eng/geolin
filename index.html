<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Chat</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.total {
  font-size: 40px;
  font-weight: bold;
}

.filter {
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

  <!-- FILTER -->
  <div class="card filter">
    <label>Tanggal:</label>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="loadData()">Filter</button>
  </div>

  <!-- TOTAL -->
  <div class="card">
    <div>Total Chat</div>
    <div class="total" id="totalChat">0</div>
  </div>

  <!-- CHART -->
  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
let chart;

// GANTI DENGAN URL WEB APP GOOGLE SHEETS KAMU
const API_URL = "https://script.google.com/macros/s/AKfycby2ehtY358ZM9kkRF9tpyU9HInuevVZyKXnPltrbXY4PuigxVKmcyYTl3fwGzC-oN_Yrw/exec";

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;

  let grouped = {};
  let total = 0;

  data.forEach(item => {
    let date = item.date;

    if (start && date < start) return;
    if (end && date > end) return;

    if (!grouped[date]) grouped[date] = 0;

    grouped[date]++;
    total++;
  });

  document.getElementById("totalChat").innerText = total;

  const labels = Object.keys(grouped);
  const values = Object.values(grouped);

  renderChart(labels, values);
}

function renderChart(labels, data) {
  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Jumlah Chat",
        data: data,
        borderWidth: 2
      }]
    }
  });
}

// load pertama
loadData();
</script>

</body>
</html>
