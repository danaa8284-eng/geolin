<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard Chat</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.total {
  font-size: 40px;
  font-weight: bold;
}

/* LOADING */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.9);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 5px solid #334155;
  border-top: 5px solid #38bdf8;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

</head>

<body>

<div class="container">

  <!-- FILTER -->

  <div class="card">
    <label>Tanggal:</label><br><br>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
    <button onclick="loadData()">Filter</button>
  </div>

  <!-- TOTAL -->

  <div class="card">
    <div>Total Chat</div>
    <div class="total" id="totalChat">0</div>
  </div>

  <!-- CHART -->

  <div class="card">
    <canvas id="chart"></canvas>
  </div>

</div>

<!-- LOADING -->

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>Memuat data...</p>
</div>

<script>
let chart;

const API_URL = "https://script.google.com/macros/s/AKfycby2ehtY358ZM9kkRF9tpyU9HInuevVZyKXnPltrbXY4PuigxVKmcyYTl3fwGzC-oN_Yrw/exec";

async function loadData() {
  document.getElementById("loading").style.display = "flex";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const start = document.getElementById("startDate").value;
    const end = document.getElementById("endDate").value;

    let grouped = {};
    let total = 0;

    const isSingleDay = start && end && start === end;

    data.forEach(item => {
      let date = item.date;
      let time = item.time;

      if (!date) return;

      date = String(date).substring(0, 10);

      if (start && date < start) return;
      if (end && date > end) return;

      let label;

      if (isSingleDay) {
        if (!time) return;

        label = String(time)
          .replace(":", ".")
          .substring(0, 5);
      } else {
        label = date;
      }

      if (!grouped[label]) grouped[label] = 0;
      grouped[label]++;
      total++;
    });

    document.getElementById("totalChat").innerText = total;

    let labels = Object.keys(grouped);

    if (isSingleDay) {
      labels.sort((a, b) => a.localeCompare(b));
    } else {
      labels.sort();
    }

    const values = labels.map(l => grouped[l]);

    renderChart(labels, values);

  } catch (err) {
    console.error("Error:", err);
    alert("Gagal ambil data");
  }

  document.getElementById("loading").style.display = "none";
}

function renderChart(labels, data) {
  if (chart) chart.destroy();

  const ctx = document.getElementById("chart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "Jumlah Chat",
        data: data,
        borderWidth: 2,
        tension: 0.3
      }]
    }
  });
}

loadData();
</script>


</body>
</html>
